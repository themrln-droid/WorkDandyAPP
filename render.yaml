services:
  - type: web
    name: audit-organizer
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: DATABASE_URL
        fromDatabase:
          name: audit-organizer-db
          property: connectionString
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_REPLY_TO
        sync: false
      - key: RESEND_API_KEY
        sync: false

databases:
  - name: audit-organizer-db
    plan: free
